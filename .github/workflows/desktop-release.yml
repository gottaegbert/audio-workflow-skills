name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.3"
        required: true
        default: "v0.1.3"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            command: pnpm dist:mac
            artifact: desktop-macos
            files: apps/desktop/release/*.dmg
            python_asset: cpython-3.12.13+20260414-aarch64-apple-darwin-install_only_stripped.tar.gz
          - name: Windows EXE
            os: windows-latest
            command: pnpm dist:win
            artifact: desktop-windows
            files: apps/desktop/release/*.exe
            python_asset: cpython-3.12.13+20260414-x86_64-pc-windows-msvc-install_only_stripped.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install desktop dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/desktop

      - name: Download bundled Python runtime
        shell: bash
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          rm -rf vendor/python-runtime
          mkdir -p vendor/python-runtime
          curl -L --fail --retry 3 \
            -o python-runtime.tar.gz \
            "https://github.com/astral-sh/python-build-standalone/releases/download/20260414/${{ matrix.python_asset }}"
          tar -xzf python-runtime.tar.gz -C vendor/python-runtime
          rm python-runtime.tar.gz

      - name: Build installer
        run: ${{ matrix.command }}
        working-directory: apps/desktop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: VocalFlow Studio ${{ steps.release.outputs.tag }}
          draft: false
          prerelease: true
          files: release-assets/*
          body: |
            Desktop prototype installers for VocalFlow Studio.

            Assets:
            - macOS: download the `.dmg`
            - Windows: download the `.exe`

            Note: this desktop app includes the `audio-subtitles` script, a bundled Python runtime, and bundled ffmpeg. On first use it creates a local runtime under the user's app data directory and installs the Python packages needed for URL download, local transcription, and optional vocal separation.
